<!DOCTYPE html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Dashboard – pregled mnenj</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login" class="login-overlay">
      <form class="login-box" id="login-form">
        <h1>🔒 Dashboard</h1>
        <div id="email-field">
          <input
            type="email"
            id="email"
            placeholder="E-pošta"
            autocomplete="username"
            aria-label="E-pošta"
          />
        </div>
        <input
          type="password"
          id="password"
          placeholder="Geslo"
          autocomplete="current-password"
          aria-label="Geslo"
        />
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn" id="login-btn">Vstopi</button>
      </form>
    </div>

    <!-- VSEBINA -->
    <div id="app" class="dash hidden">
      <header class="dash-header">
        <div>
          <h1>Pregled mnenj</h1>
          <p class="muted" id="period-note">Zadnjih 30 dni</p>
        </div>
        <button class="logout" id="logout">Odjava</button>
      </header>

      <!-- METRIKE -->
      <section class="section">
        <div class="metrics">
          <div class="metric">
            <div class="label">Skupaj mnenj</div>
            <div class="value" id="m-total">–</div>
            <div class="sub">&nbsp;</div>
          </div>
          <div class="metric">
            <div class="label">Povprečna ocena</div>
            <div class="value" id="m-avg">–</div>
            <div class="sub">&nbsp;</div>
          </div>
          <div class="metric">
            <div class="label">Šlo na Google</div>
            <div class="value" id="m-google">–</div>
            <div class="sub" id="m-google-sub">&nbsp;</div>
          </div>
          <div class="metric">
            <div class="label">Slaba mnenja (1–3★)</div>
            <div class="value" id="m-bad">–</div>
            <div class="sub" id="m-bad-sub">&nbsp;</div>
          </div>
        </div>
      </section>

      <!-- RAZPOREDITEV OCEN -->
      <section class="section">
        <h2>Razporeditev ocen</h2>
        <div class="panel" id="distribution">
          <div class="empty">Nalaganje…</div>
        </div>
      </section>

      <!-- LOKACIJE -->
      <section class="section">
        <h2>Pregled po lokacijah</h2>
        <div class="panel">
          <table class="locations">
            <thead>
              <tr>
                <th>Lokacija</th>
                <th class="num">Povp. ocena</th>
                <th class="num">Mnenj</th>
                <th>Zvezde</th>
              </tr>
            </thead>
            <tbody id="loc-body">
              <tr>
                <td colspan="4"><div class="empty">Nalaganje…</div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- SLABA MNENJA -->
      <section class="section">
        <h2>Slaba mnenja</h2>
        <div class="chips" id="chips">
          <button class="chip active" data-filter="all">Vsa</button>
          <button class="chip" data-filter="unread">Neprebrana</button>
          <button class="chip" data-filter="12">1–2★</button>
          <button class="chip" data-filter="3">3★</button>
        </div>
        <div id="bad-list">
          <div class="empty">Nalaganje…</div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="mock-data.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
