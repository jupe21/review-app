<!DOCTYPE html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin – lokacije</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login" class="login-overlay">
      <form class="login-box" id="login-form">
        <h1>🔑 Admin</h1>
        <div id="email-field">
          <input
            type="email"
            id="email"
            placeholder="E-pošta"
            autocomplete="username"
            aria-label="E-pošta"
          />
        </div>
        <input
          type="password"
          id="password"
          placeholder="Geslo"
          autocomplete="current-password"
          aria-label="Geslo"
        />
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn" id="login-btn">Vstopi</button>
      </form>
    </div>

    <!-- VSEBINA -->
    <div id="app" class="dash hidden">
      <header class="dash-header">
        <div>
          <h1>Admin – lokacije</h1>
          <p class="muted">Poln dostop do vseh lokacij in mnenj</p>
        </div>
        <div>
          <a class="logout" href="dashboard.html" style="text-decoration:none;margin-right:8px">Dashboard</a>
          <button class="logout" id="logout">Odjava</button>
        </div>
      </header>

      <!-- opozorilo: ni admin -->
      <section id="not-admin" class="section hidden">
        <div class="panel">
          <div class="empty">
            ⛔ Ta račun nima admin pravic.<br />
            Dodaj svojo e-pošto v tabelo <code>admins</code> (glej README).
          </div>
        </div>
      </section>

      <!-- admin vsebina -->
      <div id="admin-content" class="hidden">
        <!-- dodaj / uredi lokacijo -->
        <section class="section">
          <h2 id="form-title">Dodaj lokacijo</h2>
          <div class="panel">
            <form id="loc-form" class="loc-form">
              <label>
                ID <span class="muted">(za URL <code>/?loc=ID</code>)</span>
                <input id="f-id" type="text" placeholder="npr. ABC123" required />
              </label>
              <label>
                Ime lokacije
                <input id="f-name" type="text" placeholder="npr. Kavarna Center" required />
              </label>
              <label>
                Google Review URL
                <input id="f-url" type="url" placeholder="https://search.google.com/local/writereview?placeid=..." required />
              </label>
              <label>
                Lastnik – e-pošta <span class="muted">(prijavna e-pošta lastnika)</span>
                <input id="f-owner" type="email" placeholder="lastnik@primer.si" />
              </label>
              <p class="form-msg" id="form-msg"></p>
              <div class="form-actions">
                <button type="submit" class="btn" id="save-btn">Shrani lokacijo</button>
                <button type="button" class="btn-link" id="reset-btn">Počisti obrazec</button>
              </div>
            </form>
          </div>
        </section>

        <!-- vse lokacije -->
        <section class="section">
          <h2>Vse lokacije</h2>
          <div class="panel">
            <table class="locations">
              <thead>
                <tr>
                  <th>Ime</th>
                  <th>ID</th>
                  <th>Lastnik</th>
                  <th class="num">Mnenj</th>
                  <th class="num">Povp.</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="loc-body">
                <tr>
                  <td colspan="6"><div class="empty">Nalaganje…</div></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="mock-data.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
