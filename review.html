<!DOCTYPE html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Vaše mnenje</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="review-page">
      <div class="card">
        <!-- KORAK 1: ocena -->
        <section id="step-rate" class="step active">
          <h1 data-i18n="rate_title">Kako zadovoljni ste bili?</h1>
          <p class="subtitle" data-i18n="rate_subtitle">Vaše mnenje nam veliko pomeni.</p>

          <div class="stars" id="stars" role="radiogroup" aria-label="Ocena od 1 do 5">
            <button class="star" type="button" data-value="1" aria-label="1">★</button>
            <button class="star" type="button" data-value="2" aria-label="2">★</button>
            <button class="star" type="button" data-value="3" aria-label="3">★</button>
            <button class="star" type="button" data-value="4" aria-label="4">★</button>
            <button class="star" type="button" data-value="5" aria-label="5">★</button>
          </div>

          <p class="hint" id="rate-hint"></p>

          <button class="btn" id="btn-next" data-i18n="next" disabled>Naprej</button>
        </section>

        <!-- KORAK 2: izbira platforme (za 4–5 zvezdic) -->
        <section id="step-platform" class="step">
          <div class="thanks-icon">🌟</div>
          <h1 data-i18n="platform_title">Odlično!</h1>
          <p class="subtitle" data-i18n="platform_subtitle">Kje bi nas ocenili?</p>
          <div id="platform-btns" class="platform-btns"></div>
          <button class="btn-link" id="btn-skip-platform" data-i18n="no_thanks">Raje ne, hvala</button>
        </section>

        <!-- KORAK 3: feedback za 1 do 3 zvezde -->
        <section id="step-feedback" class="step">
          <h1 data-i18n="feedback_title">Žal nam je.</h1>
          <p class="subtitle" data-i18n="feedback_subtitle">Povejte nam, kaj je šlo narobe in popravili bomo.</p>
          <textarea
            id="feedback-text"
            data-i18n-placeholder="feedback_placeholder"
            placeholder="Opišite vašo izkušnjo..."
            aria-label="Opišite vašo izkušnjo"
          ></textarea>
          <button class="btn" id="btn-send" data-i18n="send">Pošlji</button>
        </section>

        <!-- KORAK 4: zahvala po feedbacku -->
        <section id="step-thanks" class="step">
          <div class="thanks-icon">✅</div>
          <h1 data-i18n="feedback_thanks_title">Hvala za sporočilo</h1>
          <p class="subtitle" data-i18n="feedback_thanks_subtitle">Upoštevali bomo vaše mnenje.</p>
        </section>

        <!-- KORAK 5: napaka (manjkajoča/neveljavna lokacija) -->
        <section id="step-error" class="step">
          <div class="thanks-icon">⚠️</div>
          <h1 data-i18n="error_title">Lokacija ni najdena</h1>
          <p class="subtitle" id="error-text">
            Povezava ni veljavna. Prosimo, ponovno skenirajte kodo.
          </p>
        </section>
      </div>
    </main>

    <!-- Supabase JS client (uporabljen, ko USE_MOCK = false) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="mock-data.js"></script>
    <script src="platforms.js"></script>
    <script src="review.js"></script>
  </body>
</html>
